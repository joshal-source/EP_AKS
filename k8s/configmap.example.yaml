# Copy to configmap.yaml and replace GUIDs with values from Splunk UI
# or generate via scripts/create-configmap-from-splunk.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: ep-instance-guids
  namespace: splunk-edge
data:
  EP_INSTANCE: "your-group-guid-from-install-script"
  # Or use a descriptive key with --group-key when running setup-from-install-script.sh:
  # EP_CORP_DC_1: "your-guid-here"
