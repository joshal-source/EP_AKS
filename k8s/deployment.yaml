apiVersion: apps/v1
kind: Deployment
metadata:
  name: ep-deployment
  namespace: splunk-edge
  labels:
    app: ep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ep
  template:
    metadata:
      labels:
        app: ep
    spec:
      # Required for private GHCR package:
      imagePullSecrets:
        - name: registry-pull-secret
      containers:
        - name: ep
          # GitHub:     ghcr.io/yourusername/edgeprocessor:latest
          # Docker Hub: yourusername/edgeprocessor:latest
          # ACR:        myacr.azurecr.io/edgeprocessor:latest
          image: ghcr.io/joshal-source/edgeprocessor:latest
          imagePullPolicy: Always
          env:
            - name: DMX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: edge-processor-secrets
                  key: token
            - name: GROUP_ID
              valueFrom:
                configMapKeyRef:
                  name: ep-instance-guids
                  key: EP_CORP_DC_1
            - name: DMX_HOST
              value: "ec2-3-138-156-139.us-east-2.compute.amazonaws.com"
            - name: DMX_ENV
              value: "production"
            # REQUIRED: copy from Splunk UI → Edge Processor → Manage instances → Install script
            # Run: ./scripts/extract-package-from-install-script.sh install-script.txt
            - name: SPLUNK_EDGE_PACKAGE_URL
              value: "https://ec2-3-138-156-139.us-east-2.compute.amazonaws.com:8089/servicesNS/-/splunk_pipeline_builders/dmx/packages/splunk-edge/v0.1.637-aaeca567-20260319t172332/linux-amd64/splunk-edge.tar.gz"
            # SHA-256 from install script
            - name: SPLUNK_EDGE_PACKAGE_CHECKSUM
              value: "3debf5e04e28d0cf5b7a4a21478ad6aa004b2ad91d125e467306720fc52698a1"
            # Self-signed TLS on control plane — required for this environment
            - name: DMX_INSECURE
              value: "true"
          resources:
            requests:
              cpu: "2000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
          ports:
            - name: s2s
              containerPort: 9997
              protocol: TCP
            - name: hec
              containerPort: 8088
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pidof splunk-edge
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pidof splunk-edge
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    if pid=$(pidof splunk-edge 2>/dev/null); then
                      kill "$pid" || true
                      wait "$pid" 2>/dev/null || true
                    fi
                    if [ -x /opt/splunk-edge/splunk-edge/bin/splunk-edge ]; then
                      /opt/splunk-edge/splunk-edge/bin/splunk-edge offboard || true
                    fi
