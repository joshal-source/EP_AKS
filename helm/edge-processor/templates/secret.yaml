{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "edge-processor.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.key }}: {{ required "secret.provisioningToken is required when secret.create is true" .Values.secret.provisioningToken | quote }}
{{- end }}
